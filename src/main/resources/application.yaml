server:
  port: 8085

spring:
  datasource:
    # url: jdbc:h2:mem:testdb
    url: jdbc:h2:file:./data/sampledb
    driver-class-name: org.h2.Driver
    username: user
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
  jackson:
    deserialization:
      fail-on-unknown-properties: true
